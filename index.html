<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sakshi</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#ff9a9e,#fecfef);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
flex-direction:column;
}

h1{
font-size:40px;
animation: glow 1.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px gold;}
}

button{
padding:8px 15px;
border:none;
border-radius:20px;
background:white;
color:#ff4b7d;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.balloon{
position:absolute;
bottom:-50px;
font-size:30px;
animation:float 8s linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-110vh);}
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Sakshi 🎉</h1>
<h2>✨ May All Your Dreams Come True ✨</h2>
<div style="font-size:50px;">🎂</div>
<button onclick="playMusic()">Play Music 🎵</button>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function playMusic(){
document.getElementById("music").play();
}

/* Balloons */
for(let i=0;i<8;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}
</script>

</body>
</html>
