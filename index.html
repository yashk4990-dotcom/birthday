<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Sakshi</title>
<style>
body{
margin:0;
background:linear-gradient(to right, #ff9a9e, #fecfef);
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

h1{
margin-top:120px;
font-size:60px;
animation: glow 1.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 35px gold;}
}

canvas{
position:absolute;
top:0;
left:0;
}

.message{
position:relative;
z-index:2;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="message">
<h1>🎉 Happy Birthday Sakshi 🎉</h1>
<h2>✨ May All Your Dreams Come True ✨</h2>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(){
let x = Math.random() * canvas.width;
let y = Math.random() * canvas.height/2;
for(let i=0;i<60;i++){
particles.push({
x:x,
y:y,
radius:2,
color:`hsl(${Math.random()*360},100%,50%)`,
speedX:(Math.random()-0.5)*7,
speedY:(Math.random()-0.5)*7
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

p.x+=p.speedX;
p.y+=p.speedY;

if(p.radius>0.1) p.radius-=0.03;
if(p.radius<=0.1) particles.splice(index,1);
});

requestAnimationFrame(animate);
}

setInterval(createFirework,700);
animate();
</script>

</body>
</html>
